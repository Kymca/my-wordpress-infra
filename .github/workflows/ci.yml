name: Docker Build and Push

# 1. КОГДА запускать робота? (При каждом push в ветку main)
on:
  push:
    branches: [ "main" ]

# 2. ЧТО делать?
jobs:
  build:
    runs-on: ubuntu-latest # Робот арендует свежую Ubuntu на серверах GitHub
    
    steps:
    # Шаг А: Скачать твой код из репозитория
    - name: Checkout code
      uses: actions/checkout@v3

    # Шаг Б: Залогиниться в Docker Hub (используя ключи из сейфа)
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USER }}
        password: ${{ secrets.DOCKER_PASS }}

    # Шаг В: Собрать образ и отправить его в интернет
    - name: Build and Push
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKER_USER }}/auto-site:v1
